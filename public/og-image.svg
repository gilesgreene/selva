<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0B0F1A"/>
  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1E2D3D" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.4"/>
  <!-- Glow behind icon -->
  <ellipse cx="600" cy="260" rx="200" ry="120" fill="#4EEBC0" opacity="0.04"/>
  <!-- Large icon mark -->
  <rect x="518" y="90" width="164" height="164" rx="32" fill="#0D1B2A" stroke="#1E2D3D" stroke-width="1"/>
  <path d="M548 228 L600 128 L652 228" stroke="#4EEBC0" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M560 200 L640 200" stroke="#4EEBC0" stroke-width="6" stroke-linecap="round" fill="none"/>
  <circle cx="652" cy="155" r="14" fill="#4EEBC0" opacity="0.95"/>
  <circle cx="652" cy="155" r="7" fill="#0B0F1A"/>
  <!-- Wordmark -->
  <text x="600" y="336" font-family="'Sora', 'Helvetica Neue', sans-serif" font-weight="700" font-size="72" letter-spacing="-2" fill="#FFFFFF" text-anchor="middle">Veda<tspan fill="#4EEBC0">Sales</tspan></text>
  <!-- Tagline -->
  <text x="600" y="390" font-family="'DM Mono', 'Courier New', monospace" font-weight="400" font-size="18" letter-spacing="6" fill="#4EEBC0" text-anchor="middle" opacity="0.8">ECOMMERCE INTELLIGENCE</text>
  <!-- Bottom descriptor -->
  <text x="600" y="480" font-family="'Sora', 'Helvetica Neue', sans-serif" font-weight="400" font-size="22" fill="#7B8FB7" text-anchor="middle">Find winning products before they peak</text>
  <!-- Bottom accent line -->
  <rect x="540" y="510" width="120" height="2" rx="1" fill="#4EEBC0" opacity="0.5"/>
</svg>
